<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — The Clearing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .lost { max-width: 500px; margin: 0 auto; padding: 8rem 2rem; text-align: center; }
    .lost h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--color-forest); margin-bottom: 1rem; }
    .lost p { font-family: 'Lora', serif; font-style: italic; color: var(--color-bark); margin-bottom: 2rem; }
    .lost a { display: inline-block; padding: 0.85rem 2rem; background: var(--color-forest); color: var(--color-cream); font-family: 'Inter', sans-serif; border-radius: 4px; text-decoration: none; }
  </style>
</head>
<body>
  <main class="lost">
    <h1>You wandered off the path.</h1>
    <p>This page doesn't exist — but the clearing does.</p>
    <a href="/">Come back to the clearing</a>
  </main>
</body>
</html>
