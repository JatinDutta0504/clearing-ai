    ],

  },
  skill: {

    symptoms: [

    ],
    resources: [

      { title: "AI Tool Comparison", desc: "Which tools cause the most skill loss", url: "compare.html" },
      { title: "AI-Free Blocks", desc: "Weekly practices to rebuild capability", url: "no-ai-block.html" },

// Scoring
let answers = [];

function showStep(idx) {
  const total = QUESTIONS.length;
  document.getElementById('progress').style.width = ((idx) / total * 100) + '%';
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  const step = document.createElement('div');
  step.className = 'step active';
  
  if (idx < total) {
    const q = QUESTIONS[idx];
    step.innerHTML = `
      <p class="question">${idx + 1}. ${q.q}</p>
      <div class="options">
        ${q.options.map((o, i) => `
          <div class="option" onclick="selectOption(${idx}, ${i}, '${o.type}')">${o.label}</div>
        `).join('')}
      </div>
      <div class="nav-row">
        ${idx > 0 ? `<button class="secondary" onclick="prevStep(${idx})">← Back</button>` : `<span></span>`}
        ${idx === total - 1 ? `<button id="calc-btn" disabled onclick="calculate()">See My Type →</button>` : `<button disabled id="next-${idx}">Next →</button>`}
      </div>
      <p class="skip-link" onclick="skipToResult()">Skip calculator →</p>
    `;
  }
  
  document.getElementById('calculator').innerHTML = '';
  document.getElementById('calculator').appendChild(step);
}

function selectOption(questionIdx, optionIdx, type) {
  answers[questionIdx] = type;
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.remove('selected'));
  opts[optionIdx].classList.add('selected');
  document.getElementById('next-' + questionIdx).disabled = false;
}

function prevStep(idx) {
  showStep(idx - 1);
}

function calculate() {
  const counts = { cognitive: 0, skill: 0, identity: 0, decision: 0 };
  answers.forEach(a => { if (a) counts[a]++; });
  const primary = Object.keys(counts).reduce((a, b) => counts[b] > counts[a] ? b : a);
  showResult(primary, counts);
}

function showResult(primary, counts) {
  const total = QUESTIONS.length;
  const t = TYPES[primary];
  const maxCount = Math.max(...Object.values(counts));
  
  document.getElementById('progress').style.width = '100%';
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  
  const resultEl = document.getElementById('result');
  resultEl.classList.add('active');
  
  const comparisonBars = Object.entries(TYPES).map(([key, val]) => {
    const pct = (counts[key] / maxCount) * 100;
    return `<div class="bar-row">
      <span class="bar-label">${val.name.split(' ')[0]}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${key === primary ? '#78c490' : '#2a3f2a'}"></div></div>
      <span class="bar-value">${counts[key]}/${total}</span>
    </div>`;
  }).join('');

  const symptomCards = t.symptoms.map(s => `<div class="symptom-card">${s}</div>`).join('');
  
  const actionPhases = [
    { title: "Today", text: `Name the pattern to yourself: "I have ${t.name}." Writing it down breaks the denial loop.` },
    { title: "This Week", text: `Audit your AI usage for ${primary === 'cognitive' ? 'decision load' : primary === 'skill' ? 'skill bypass opportunities' : primary === 'identity' ? 'authorship gaps' : 'choice fatigue triggers'}. Track when you reach for AI and why.` },
    { title: "This Month", text: `Pick one recommended resource below and work through it. Small changes compound.` },
  ].map(p => `<div class="action-phase"><div class="phase-title">${p.title}</div><p>${p.text}</p></div>`).join('');

  const resourceCards = t.resources.map(r => `<a href="${r.url}" class="resource-card"><div class="r-title">${r.title}</div><div class="r-desc">${r.desc}</div></a>`).join('');

  resultEl.innerHTML = `
    <div class="result-header">
      <div class="result-type">${t.name}</div>
      <div class="result-tagline">${t.tagline}</div>
    </div>
    
    <div class="result-score">
      <div class="score-item"><div class="score-num">${counts[primary]}/${total}</div><div class="score-label">Your Primary Score</div></div>
    </div>
    
    <div class="type-comparison">
      <h3>Your full breakdown</h3>
      <div class="comparison-bars">${comparisonBars}</div>
    </div>
    
    <div class="result-description">${t.description}</div>
    
    <div class="symptoms-grid">${symptomCards}</div>
    
    <div class="action-plan">
      <h3>Where to start</h3>
      ${actionPhases}
    </div>
    
    <div class="related-resources">
      <h3>Recommended reading</h3>
      <div class="resources-grid">${resourceCards}</div>
    </div>
    
    <div class="share-row">
      <button class="share-btn" onclick="shareTwitter('${primary}')">Share on Twitter</button>
      <button class="share-btn" onclick="shareLinkedIn('${primary}')">Share on LinkedIn</button>
      <button class="share-btn" onclick="copyLink('${primary}')">Copy Link</button>
    </div>
    
    <p class="retake">Not accurate? <a onclick="resetCalc()">Retake the calculator →</a></p>
  `;

  // Scroll to top of results
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareTwitter(type) {
  const msgs = {
    cognitive: "I just took the AI Fatigue Type Calculator on @clearing_ai. Turns out I have Cognitive Load type — my brain is drowning in evaluation tasks. Worth 3 minutes to understand what's actually going on.",
    skill: "I just took the AI Fatigue Type Calculator on @clearing_ai. I scored highest on Skill Erosion type — I'm shipping more while actually understanding less. Worth checking.",
    identity: "I just took the AI Fatigue Type Calculator on @clearing_ai. My type is Identity Crisis — the code I ship doesn't feel like mine anymore. This explained something I've been avoiding.",
    decision: "I just took the AI Fatigue Type Calculator on @clearing_ai. Turns out I have Decision Fatigue type — I'm exhausted from evaluating AI suggestions all day. This explains everything.",
  };
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(msgs[type])}&url=${encodeURIComponent('https://clearing-ai.com/ai-fatigue-type-calculator.html')}`;
  window.open(url, '_blank');
}

function shareLinkedIn(type) {
  const text = `I just took the AI Fatigue Type Calculator at clearing-ai.com. My type: ${TYPES[type].name}. If you're a software engineer feeling off but can't name why — it's worth 3 minutes.`;
  const url = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent('https://clearing-ai.com/ai-fatigue-type-calculator.html')}`;
  window.open(url, '_blank');
}

function copyLink(type) {
  const url = `https://clearing-ai.com/ai-fatigue-type-calculator.html`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 2000);
    });
  }
}

function skipToResult() {
  // Default to cognitive for skip path
  const counts = { cognitive: 2, skill: 2, identity: 2, decision: 2 };
  showResult('cognitive', counts);
}

function resetCalc() {
  answers = [];
  showStep(0);
}

// Init
showStep(0);
